name: deploy

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_run:
    workflows: [linter]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')

    steps:
      - name: Wait for all required workflows
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'master';
            const requiredWorkflows = ['linter'];
            const triggeringWorkflow = context.payload.workflow_run.name;

            // The workflow that triggered this run already succeeded.
            // Check the other required workflow(s).
            const otherWorkflows = requiredWorkflows.filter(w => w !== triggeringWorkflow);

            for (const workflowName of otherWorkflows) {
              // Find the workflow ID by name
              const { data: workflows } = await github.rest.actions.listRepoWorkflows({ owner, repo });
              const wf = workflows.workflows.find(w => w.name === workflowName);
              if (!wf) {
                core.setFailed(`Workflow "${workflowName}" not found`);
                return;
              }

              // Get the latest run on this branch
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: wf.id,
                branch,
                per_page: 1,
                status: 'completed',
              });

              if (runs.workflow_runs.length === 0 || runs.workflow_runs[0].conclusion !== 'success') {
                core.setFailed(`Latest "${workflowName}" run on ${branch} did not succeed`);
                return;
              }

              // Ensure it's from the same commit
              const expectedSha = context.payload.workflow_run.head_sha;
              if (runs.workflow_runs[0].head_sha !== expectedSha) {
                core.setFailed(`"${workflowName}" latest success is for a different commit`);
                return;
              }
            }

            core.info('All required workflows passed for the same commit ✅');

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: master
          clean: true

      - name: Set up environment file
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Set up Docker environment file
        run: echo "${{ secrets.PROD_ENV_DOCKER_FILE }}" > .env.docker

      - name: Stop prod containers
        run: docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

      - name: Build and deploy Docker stack
        run: |
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml up -d --force-recreate

      - name: Wait for MySQL to be ready
        run: |
          echo "Container status:"
          docker compose -f docker-compose.prod.yml ps

          echo ""
          echo "Waiting for MySQL to accept connections..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T umamusume-php \
              php -r "try { new PDO('mysql:host=umamusume-mysql;port=3306', 'umamusume_db_user', 'NUg9/S1Z4gF9AT0lelFghoRXI89vjlIXD1rWaanpDgc='); echo 'OK'; } catch (\Exception \$e) { exit(1); }" 2>/dev/null; then
              echo ""
              echo "✅ MySQL is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 - MySQL not ready yet, waiting 2s..."
            sleep 2
          done
          echo ""
          echo "❌ MySQL did not become ready in time"
          echo "MySQL container logs:"
          docker compose -f docker-compose.prod.yml logs umamusume-mysql --tail=30
          exit 1

      - name: Install Composer dependencies
        run: |
          docker compose -f docker-compose.prod.yml exec -T umamusume-php \
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: |
          docker compose -f docker-compose.prod.yml exec -T umamusume-php npm ci

      - name: Run post-deploy Artisan commands
        run: |
          docker compose -f docker-compose.prod.yml exec -T umamusume-php php artisan migrate --force
          docker compose -f docker-compose.prod.yml exec -T umamusume-php php artisan config:cache
          docker compose -f docker-compose.prod.yml exec -T umamusume-php php artisan route:cache
          docker compose -f docker-compose.prod.yml exec -T umamusume-php php artisan view:cache
          docker compose -f docker-compose.prod.yml exec -T umamusume-php php artisan event:cache

      - name: Create storage link
        run: |
          docker compose -f docker-compose.prod.yml exec -T umamusume-php sh -c \
            'if [ ! -L public/storage ]; then php artisan storage:link; fi'

      - name: Set permissions
        run: |
          docker compose -f docker-compose.prod.yml exec -T umamusume-php sh -c '\
            chown -R www-data:www-data storage bootstrap/cache && \
            chmod -R 775 storage bootstrap/cache'

      - name: Verify deployment
        run: |
          echo "Checking container status..."
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "Health check..."
          curl -sf http://localhost:8106 > /dev/null && echo "✅ App is responding" || echo "❌ App is not responding"
