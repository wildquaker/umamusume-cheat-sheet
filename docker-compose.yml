services:
  umamusume-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: umamusume-cheat-sheet:latest
    container_name: umamusume-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    volumes:
      - ./app/data:/app/app/data:ro

  umamusume-nginx:
    image: nginx:1.29.6-alpine-slim
    container_name: umamusume-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - umamusume-app
