version: '3.8'

services:
  umamusume-nginx:
    image: nginx:1.29.5-alpine-slim
    container_name: umamusume-nginx
    restart: unless-stopped
    ports:
      - '8106:80'
      - '8107:81'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - umamusume-phpmyadmin-data:/var/www/phpmyadmin
    depends_on:
      - umamusume-php
      - umamusume-phpmyadmin
    networks:
      - umamusume-network

  umamusume-php:
    container_name: umamusume-php
    restart: unless-stopped
    build: ./docker/php
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - umamusume-vendor-data:/var/www/html/vendor
      - umamusume-node-modules-data:/var/www/html/node_modules
      - umamusume-storage-data:/var/www/html/storage
    depends_on:
      - umamusume-mysql
    networks:
      - umamusume-network

  umamusume-mysql:
    image: mysql:9.6.0
    container_name: umamusume-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - umamusume-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - umamusume-network

  umamusume-phpmyadmin:
    image: phpmyadmin:5.2.3-fpm
    container_name: umamusume-phpmyadmin
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PMA_HOST: umamusume-mysql
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - umamusume-phpmyadmin-data:/var/www/html
    depends_on:
      - umamusume-mysql
    networks:
      - umamusume-network

volumes:
  umamusume-mysql-data:
  umamusume-vendor-data:
  umamusume-node-modules-data:
  umamusume-storage-data:
  umamusume-phpmyadmin-data:

networks:
  umamusume-network:
    driver: bridge
