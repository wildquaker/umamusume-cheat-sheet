services:
  umamusume-nginx:
    image: nginx:1.29.5-alpine-slim
    container_name: umamusume-nginx
    restart: unless-stopped
    ports:
      - '8106:80'
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - umamusumep-php-data:/var/www/html
      - umamusume-storage-data:/var/www/html/storage
      - umamusume-php-vendor-data:/var/www/html/vendor
    depends_on:
      - umamusume-php
    networks:
      - umamusume-network

  umamusume-php:
    container_name: umamusume-php
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    env_file:
      - .env
    volumes:
      - umamusumep-php-data:/var/www/html
      - umamusume-storage-data:/var/www/html/storage
      - umamusume-php-vendor-data:/var/www/html/vendor
    depends_on:
      - umamusume-mysql
    networks:
      - umamusume-network

  umamusume-mysql:
    image: mysql:9.6.0
    container_name: umamusume-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - umamusume-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - umamusume-network

volumes:
  umamusume-mysql-data:
  umamusume-storage-data:
  umamusumep-php-data:
  umamusume-php-vendor-data:

networks:
  umamusume-network:
    driver: bridge
